{{ define "home_programs.html" }}
<section id="blog" class="py-24" style="background: linear-gradient(180deg, #f7f2e8 0%, #eef7f0 100%);">
    <div class="max-w-6xl mx-auto px-6">
        <p class="text-center text-yellow-600 text-xs tracking-widest uppercase mb-3">Artikel &amp; Kajian</p>
        <h2 class="section-title text-center text-deep-green text-3xl md:text-4xl font-bold mb-2">Program &amp;
            Pengajian</h2>
        <div class="gold-divider w-20 mx-auto mb-12"></div>

        <div class="grid md:grid-cols-3 gap-8">
            {{ range .Programs }}
            <article class="bg-white rounded-2xl overflow-hidden shadow-md card-hover border border-green-100">
                <div class="geo-bg h-44 flex items-center justify-center">
                    <svg class="w-16 h-16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8,54 L8,14 Q32,2 56,14 L56,54 Q32,46 8,54Z" fill="#2e7d52" opacity="0.7" />
                        <path d="M32,2 L32,54" stroke="#c9a84c" stroke-width="1.5" opacity="0.8" />
                        <line x1="8" y1="22" x2="56" y2="22" stroke="#c9a84c" stroke-width="0.5" opacity="0.5" />
                        <line x1="8" y1="30" x2="56" y2="30" stroke="#c9a84c" stroke-width="0.5" opacity="0.5" />
                        <line x1="8" y1="38" x2="56" y2="38" stroke="#c9a84c" stroke-width="0.5" opacity="0.5" />
                        <line x1="8" y1="46" x2="56" y2="46" stroke="#c9a84c" stroke-width="0.5" opacity="0.5" />
                    </svg>
                </div>
                <div class="p-6">
                    <p class="text-yellow-600 text-xs tracking-widest uppercase mb-2">{{ .Category }} · {{ .Schedule }}</p>
                    <h3 class="font-['Cinzel'] text-deep-green font-bold text-lg mb-3">{{ .Title }}</h3>
                    <p class="text-mid-green/70 text-sm leading-relaxed mb-4">{{ .Description }}</p>
                    <a href="/program"
                        class="text-yellow-600 text-sm font-semibold tracking-wide hover:text-yellow-700 transition flex items-center gap-1">
                        Selengkapnya
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </a>
                </div>
            </article>
            {{ end }}
        </div>

        <div class="text-center mt-12">
            <a href="#"
                class="inline-block border-2 border-deep-green/30 text-deep-green hover:border-yellow-600 hover:text-yellow-600 font-semibold text-sm tracking-widest uppercase px-10 py-3 rounded transition-all duration-300">
                Lihat Semua Program
            </a>
        </div>
    </div>
</section>
{{ end }}
