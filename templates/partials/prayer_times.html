<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4" id="prayer-grid" hx-get="/prayers" hx-trigger="every 60s" hx-swap="outerHTML">
    {{ range .Prayers }}
    <div class="prayer-card {{ if .IsNext }}bg-yellow-600/20 border-yellow-500{{ else }}bg-white/5{{ end }} rounded-lg p-5 text-center card-hover">
        <p class="{{ if .IsNext }}text-yellow-400{{ else }}text-yellow-400/70{{ end }} text-xs tracking-widest uppercase mb-2">{{ .Name }}</p>
        <p class="{{ if .IsNext }}text-yellow-300{{ else }}text-cream{{ end }} font-['Cinzel'] text-2xl font-semibold">{{ .Time }}</p>
    </div>
    {{ end }}
</div>
